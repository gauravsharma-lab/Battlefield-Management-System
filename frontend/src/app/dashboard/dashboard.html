<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Dashboard</h1>
  </div>

  <div class="dashboard-grid">
    <a routerLink="/assets" class="dashboard-card">
      <div class="card-content">
        <h3>Assets</h3>
        <p>Manage units and equipment</p>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a routerLink="/scenarios" class="dashboard-card">
      <div class="card-content">
        <h3>Scenarios</h3>
        <p>Mission planning and simulations</p>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a routerLink="/admin/users" *ngIf="auth.isAdmin()" class="dashboard-card admin">
      <div class="card-content">
        <h3>Users</h3>
        <p>System administration</p>
      </div>
      <div class="card-arrow">→</div>
    </a>
  </div>
</div>
