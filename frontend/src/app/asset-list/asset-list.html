<h2 style="text-align:center;">Assets</h2>

<!-- DEBUG (keep temporarily) -->
<p>{{ assets.length }}</p>

<div class="card-container">

  <div class="card" *ngFor="let asset of assets">

    <h3>{{ asset.name }}</h3>

    <p>Type: {{ asset.type }}</p>
    <p>Team: {{ asset.team }}</p>
    <p>Status: {{ asset.status }}</p>

    <button (click)="editAsset(asset)">Edit</button>
    <button (click)="deleteAsset(asset._id)">Delete</button>

  </div>

</div>
